name: Cypress Tests

on:
  push:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Start Next.js app
        run: |
          npm run dev &
          npx wait-on http://localhost:3000

      - name: Run Cypress tests
        run: npx cypress run